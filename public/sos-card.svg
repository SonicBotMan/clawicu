<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ClawICU SOS emergency rescue card">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c14"/>
      <stop offset="45%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#030609"/>
    </linearGradient>
    <radialGradient id="glow-red" cx="22%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="88%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#00e87a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e87a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="urlBarFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1510"/>
      <stop offset="100%" stop-color="#040807"/>
    </linearGradient>
    <linearGradient id="urlReadout" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#061208"/>
      <stop offset="100%" stop-color="#0a1812"/>
    </linearGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="hazard" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="24" fill="#ff4d4d"/>
      <rect x="12" width="12" height="24" fill="#0a0a0a"/>
    </pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#000"/>
      <rect width="4" height="1" fill="#00e87a" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-red)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>

  <!-- Hazard stripes (bottom strip inset from y=630 so headless screenshots never clip the lower edge) -->
  <rect x="0" y="0" width="1200" height="14" fill="url(#hazard)"/>
  <rect x="0" y="598" width="1200" height="14" fill="url(#hazard)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#00e87a" stroke-width="0.5">
    <path d="M0 126h1200M0 252h1200M0 378h1200M0 504h1200"/>
    <path d="M150 14v602M300 14v602M450 14v602M600 14v602M750 14v602M900 14v602M1050 14v602"/>
  </g>

  <!-- Large medical cross (watermark) -->
  <g transform="translate(130 200)" opacity="0.07" fill="#ff4d4d">
    <rect x="-35" y="-120" width="70" height="240" rx="10"/>
    <rect x="-120" y="-35" width="240" height="70" rx="10"/>
  </g>

  <!-- ECG line -->
  <path d="M40 420 L200 420 L220 380 L240 460 L260 370 L280 470 L300 420 L460 420 L480 380 L500 460 L520 370 L540 470 L560 420 L720 420 L740 380 L760 460 L780 370 L800 470 L820 420 L1160 420"
        fill="none" stroke="#ff4d4d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- SOS badge -->
  <g transform="translate(72 58)">
    <rect x="0" y="0" width="200" height="40" rx="8" fill="rgba(255,77,77,0.12)" stroke="#ff4d4d" stroke-width="1.2" opacity="0.95"/>
    <text x="20" y="27" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" font-weight="700" fill="#ff6b6b" letter-spacing="0.12em">SOS EMERGENCY</text>
  </g>

  <!-- Headline block -->
  <text x="72" y="150" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="800" fill="#f0f4ff">My OpenClaw just crashed!</text>
  <text x="72" y="200" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" fill="#8892b0">Running emergency rescue...</text>

  <!-- Terminal block -->
  <g filter="url(#softShadow)">
    <rect x="72" y="232" width="720" height="86" rx="12" fill="#020a06" stroke="rgba(0,232,122,0.28)" stroke-width="1.5"/>
    <rect x="72" y="232" width="720" height="28" rx="12" fill="rgba(0,232,122,0.06)"/>
    <rect x="72" y="246" width="720" height="14" fill="rgba(0,232,122,0.06)"/>
    <circle cx="92" cy="246" r="4" fill="#ff5f57" opacity="0.85"/>
    <circle cx="108" cy="246" r="4" fill="#febc2e" opacity="0.85"/>
    <circle cx="124" cy="246" r="4" fill="#28c840" opacity="0.85"/>
    <text x="148" y="250" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" font-weight="700" fill="rgba(0,232,122,0.55)" letter-spacing="0.2em">ICU TERMINAL</text>
    <text x="92" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17" fill="#5a9a72">$ </text>
    <text x="112" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17" fill="#c8ffd4">curl -fsSL https://xagent.icu/r | sh</text>
  </g>

  <!-- Stat pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" font-weight="700" letter-spacing="0.08em">
    <rect x="72" y="338" width="118" height="30" rx="6" fill="rgba(255,77,77,0.1)" stroke="rgba(255,77,77,0.35)"/>
    <text x="86" y="358" fill="#ff7a7a">20 CHECKS</text>
    <rect x="202" y="338" width="138" height="30" rx="6" fill="rgba(255,176,32,0.1)" stroke="rgba(255,176,32,0.35)"/>
    <text x="216" y="358" fill="#ffb020">AUTO-REPAIR</text>
    <rect x="352" y="338" width="100" height="30" rx="6" fill="rgba(0,232,122,0.1)" stroke="rgba(0,232,122,0.3)"/>
    <text x="366" y="358" fill="#00e87a">STABLE</text>
  </g>

  <!-- Brand row -->
  <g transform="translate(72 392)">
    <rect x="0" y="-18" width="22" height="22" rx="4" fill="rgba(255,77,77,0.15)" stroke="rgba(255,77,77,0.4)"/>
    <path d="M11 4v14M4 11h14" stroke="#ff4d4d" stroke-width="2.5" stroke-linecap="round"/>
    <text x="32" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#f0f4ff">ClawICU</text>
  </g>

  <!-- ========== URL bar: ICU monitor / routing strip (shifted up: safe margin above bottom hazard + screenshot crop) ========== -->
  <g transform="translate(0 -36)">
    <!-- Shadow only on fill; feDropShadow can extend past viewBox and clip when rasterized -->
    <rect x="48" y="478" width="1104" height="112" rx="14" fill="url(#urlBarFill)" stroke="rgba(0,232,122,0.22)" stroke-width="1.5"/>
    <!-- Top scanline accent -->
    <rect x="48" y="478" width="1104" height="3" rx="14" fill="url(#urlBarFill)"/>
    <line x1="64" y1="492" x2="1136" y2="492" stroke="rgba(0,232,122,0.35)" stroke-width="1"/>

    <!-- Left: endpoint label stack -->
    <text x="68" y="518" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="9" font-weight="700" fill="rgba(0,232,122,0.45)" letter-spacing="0.28em">PRIMARY ENDPOINT</text>
    <text x="68" y="536" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="8" fill="rgba(136,146,176,0.55)" letter-spacing="0.18em">TLS 1.2+ ROUTING NODE</text>

    <!-- Center: phosphor URL readout (monitor bezel) -->
    <rect x="340" y="502" width="520" height="74" rx="10" fill="url(#urlReadout)" stroke="rgba(0,232,122,0.32)" stroke-width="1.2"/>
    <rect x="340" y="502" width="520" height="74" rx="10" fill="url(#scan)" opacity="0.6"/>
    <!-- Inner bezel highlight -->
    <rect x="348" y="510" width="504" height="58" rx="6" fill="none" stroke="rgba(0,232,122,0.08)" stroke-width="1"/>

    <!-- Lock + chain motif (simple paths) -->
    <g transform="translate(368 528)">
      <rect x="2" y="8" width="16" height="14" rx="2" fill="none" stroke="#4a9a6a" stroke-width="2"/>
      <path d="M6 8V5a5 5 0 0 1 10 0v3" fill="none" stroke="#4a9a6a" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- URL typography: scheme (dim) + host (phosphor) + path (muted) -->
    <text x="404" y="552" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" filter="url(#textGlow)">
      <tspan fill="#5a9a78" font-size="16" letter-spacing="0.04em">https://</tspan>
      <tspan fill="#d8ffe8" font-weight="700" font-size="26" letter-spacing="0.06em">xagent.icu</tspan>
      <tspan fill="#4a7a62" font-size="14" font-weight="600" letter-spacing="0.14em">/sos</tspan>
    </text>

    <!-- Right: live + verified strip -->
    <g transform="translate(900 512)">
      <rect x="0" y="0" width="200" height="54" rx="8" fill="rgba(0,232,122,0.06)" stroke="rgba(0,232,122,0.2)"/>
      <circle cx="24" cy="27" r="5" fill="#00e87a" opacity="0.95"/>
      <text x="38" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" font-weight="700" fill="#00e87a" letter-spacing="0.2em">LIVE</text>
      <text x="38" y="38" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="8" fill="rgba(136,146,176,0.7)" letter-spacing="0.14em">CARD PREVIEW</text>
    </g>

    <!-- Inner footer rule + breathing room so the panel reads "closed" above the hazard strip -->
    <line x1="64" y1="576" x2="1136" y2="576" stroke="rgba(0,232,122,0.22)" stroke-width="1"/>
    <text x="68" y="588" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="7" fill="rgba(136,146,176,0.35)" letter-spacing="0.22em">SECURE HANDOFF TO GATEWAY</text>
  </g>
</svg>
